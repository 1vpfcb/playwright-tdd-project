name: Playwright Tests

on:
  push: # Auto-trigger the workflow on push to main or master branches
    branches:
      - main
      - master
  pull_request: # Auto-trigger the workflow on pull requests to main or master branches
    branches:
      - main
      - master
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:  # Allows manual trigger

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest # Virtual amchine (macos-latest, windows-latest, ubuntu-latest)

    # setup the node js
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    #installs the dependencies
    - name: Install dependencies
      run: npm ci
    
    # installs the Playwright browsers (chromium, firefox, webkit) for testing. Note: Replace 'chromium' with the browser you want to test.
    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium

    # configures the environment variables for the tests
    - name: configure environment variables
      run: |
        # runs the tests in headless mode
    - name: Run Playwright tests
      run: npm run tests
      env:
        SEP_QA_URL: https://qa.sep.tdtm.cydeo.com/taws
        SEP_USERNAME: ${{ secrets.PRACTICE_USERNAME }}
        SEP_PASSWORD: ${{ secrets.PRACTICE_PASSWORD }}
        CARD_NUMBER: ${{ secrets.CARD_NUMBER }}
        EXPIRATION_DATE: ${{ secrets.EXPIRATION_DATE }}
        CVC: ${{ secrets.CVC }}
        ZIP_CODE: ${{ secrets.ZIP_CODE }}

       

    # runs the tests in headless mode (without a GUI)
    - name: Run Playwright tests
      run: npm run tests

    # Upload test results and reports
    - name: Upload Playwright test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-results
        path: |
          test-results/
          playwright-report/
        retention-days: 7
